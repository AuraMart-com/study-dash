<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Customer Reviews</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .review-card { 
            background: white; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .name { font-weight: bold; color: #333; }
        .rating { color: #f39c12; font-size: 0.9rem; }
        .text { margin-top: 5px; color: #555; }
        .loading { text-align: center; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Customer Reviews</h1>
    <div id="loading" class="loading">Loading reviews...</div>
    <div id="reviews-container"></div>
</div>

<script>
    // REPLACE 'your_api_id' with the actual ID from SheetDB
    const API_URL = 'https://sheetdb.io/api/v1/your_api_id';

    async function fetchReviews() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            const container = document.getElementById('reviews-container');
            const loading = document.getElementById('loading');
            
            // Clear loading text
            loading.style.display = 'none';

            // Loop through the rows in the Google Sheet
            data.forEach(item => {
                const card = `
                    <div class="review-card">
                        <div class="name">${item.name}</div>
                        <div class="rating">⭐ ${item.rating}/5</div>
                        <div class="text">${item.review}</div>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('loading').innerText = 'Failed to load reviews.';
        }
    }

    // Run the function when the page loads
    fetchReviews();
</script>

</body>
</html>
