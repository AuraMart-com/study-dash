<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mani Tailors | A Legacy of Style</title>
    <style>
        /* Base Styles */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; line-height: 1.6; color: #333; background-color: #fcfcfc; }
        
        /* Header: Logo and Name */
        header { 
            background: #1a1a1a; color: #d4af37; padding: 1.5rem; 
            border-bottom: 3px solid #d4af37; display: flex;
            align-items: center; justify-content: center; flex-wrap: wrap; gap: 20px;
        }
        .logo-img { max-width: 120px; height: auto; border-radius: 5px; }
        .header-text { text-align: left; }
        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; }
        header p { margin: 0; font-size: 0.9rem; font-style: italic; opacity: 0.8; }

        /* Container & Sections */
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Gallery Grid */
        .gallery-title { text-align: center; margin-top: 40px; color: #1a1a1a; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .gallery-item img { width: 100%; height: 350px; object-fit: cover; background: #eee; }
        .gallery-item p { padding: 15px; font-weight: bold; margin: 0; text-align: center; }

        /* More Button */
        .more-container { text-align: center; margin: 30px 0; }
        .btn-more { background: #1a1a1a; color: #d4af37; border: 2px solid #d4af37; padding: 10px 40px; cursor: pointer; font-size: 1rem; border-radius: 5px; }

        /* Footer & Buttons */
        footer { background: #1a1a1a; color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px;}
        .btn { display: flex; align-items: center; justify-content: center; width: 85%; max-width: 300px; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        .btn-call { background: #d4af37; color: #1a1a1a; }
        .btn-maps { background: white; color: #1a1a1a; border: 1px solid #d4af37; }
        .proprietor { margin-top: 30px; font-style: italic; border-top: 1px solid #444; padding-top: 20px; color: #bbb; }

        /* Hide sections logic */
        .hidden { display: none; }

        @media (min-width: 768px) {
            .btn-container { flex-direction: row; justify-content: center; }
            .btn { width: auto; min-width: 220px; }
        }
    </style>
</head>
<body>

<header>
    <img src="Logo.png" alt="Mani Tailors Logo" class="logo-img">
    <div class="header-text">
        <h1>MANI TAILORS</h1>
        <p>A Legacy of Style</p>
    </div>
</header>

<div class="container" id="home-page">
    <h2 class="gallery-title">Featured Designs</h2>
    <div class="gallery" id="home-gallery">
        <p style="grid-column: 1/-1; text-align: center;">Loading best designs...</p>
    </div>
    
    <div class="more-container">
        <button class="btn-more" onclick="showFullCatalog()">View More Designs</button>
    </div>
</div>

<div class="container hidden" id="catalog-page">
    <button onclick="showHome()" style="background:none; border:none; color:#666; cursor:pointer; margin-bottom:10px;">← Back to Home</button>
    <h2 class="gallery-title">All Designs</h2>
    <div class="gallery" id="full-gallery"></div>
</div>

<footer>
    
    <div class="contact-info">
        <h3>Contact Us</h3>
        <p>Phone: <strong>+91 9177686776</strong></p>
        <p>Address: H NO:5-35 Beside ZPHS, Chegur, Nandgama mandal, RR dist, Telangana.509325</p>
    </div>

    <div class="btn-container">
        <a href="tel:9177686776" class="btn btn-call">
            <span class="icon">📞</span> Call Now
        </a>
        
        <a href="https://maps.app.goo.gl/KmCR2CPkdL2HF1od6?g_st=aw" target="_blank" class="btn btn-maps">
            <span class="icon"><img src="images.jpg" alt = "gmap icon" height="27"></span>Location
        </a>
    </div>

    <div class="proprietor">
        <p>Proprietor: <strong>Manemma Baindla</strong></p>
        <p>© 2026 Mani Tailors. All Rights Reserved.</p>
    </div>
</footer>

<script>
    /**
     * PASTE YOUR API/CSV LINKS HERE
     */
    const HOME_SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1aiwP4XKW0v1ZsCWci2rYaV6frm_J7Q9f37MNAVeOuEc/edit?usp=sharing';
    const FULL_CATALOG_CSV = 'https://docs.google.com/spreadsheets/d/1awWMHoTmKlS6Dspeu80oN7keS730U3XALCFEVSwk138/edit?usp=sharing';

    // Function to fetch data and render a gallery
    async function fetchGallery(url, containerId) {
        const container = document.getElementById(containerId);
        try {
            const response = await fetch(url);
            const csvData = await response.text();
            const rows = csvData.split('\n').slice(1); // Skip header

            container.innerHTML = ''; // Clear loading text
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols[0] && cols[0].trim() !== "") {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `
                        <img src="${cols[0].trim()}" alt="Tailoring Work">
                        <p>${cols[1] ? cols[1].trim() : 'Mani Tailors Design'}</p>
                    `;
                    container.appendChild(div);
                }
            });
        } catch (e) {
            container.innerHTML = '<p>Error loading images. Please check links.</p>';
        }
    }

    // Navigation logic
    function showFullCatalog() {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('catalog-page').classList.remove('hidden');
        fetchGallery(FULL_CATALOG_CSV, 'full-gallery');
        window.scrollTo(0, 0);
    }

    function showHome() {
        document.getElementById('catalog-page').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    // Initial load for Home Page
    fetchGallery(HOME_SHEET_CSV, 'home-gallery');
</script>

</body>
</html>
